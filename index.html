<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026毕业刊 | 齿轮•转向未来</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root { --bg-dark: #000; --neon: #00f2ff; --school-red: #800000; }
        * { box-sizing: border-box; }
        
        /* 初始背景设为黑色，确保不会有白闪 */
        body { margin: 0; background: #000; color: #fff; font-family: "PingFang SC", sans-serif; overflow-x: hidden; }
        body.locked { overflow: hidden !important; }

        /* --- 封面转场层 --- */
        #intro-wrapper { width: 100%; position: relative; background: #000; }
        
        .hero-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background: #000; pointer-events: none;
        }

        /* 强化光影背景 */
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.15) 0%, #000 70%), 
                        url('bg.jpg') center/cover no-repeat;
            z-index: -1;
            opacity: 1;
        }

        /* 强化齿轮光影 */
        #gearIcon { 
            font-size: clamp(6rem, 20vw, 10rem); 
            color: #fff;
            /* 霓虹发光层 */
            text-shadow: 
                0 0 10px var(--neon),
                0 0 30px var(--neon),
                0 0 50px rgba(0, 242, 255, 0.8);
            filter: drop-shadow(0 0 15px var(--neon));
            will-change: transform;
        }

        .hero-title { font-size: clamp(2rem, 8vw, 3.5rem); margin: 20px 0; text-shadow: 0 0 15px var(--neon); font-weight: bold; }
        .hero-subtitle { font-size: 1.2rem; color: var(--neon); letter-spacing: 5px; text-transform: uppercase; }

        /* 滚动触发区 */
        .scroll-space { height: 300vh; background: transparent; }

        /* --- 主内容区 --- */
        .main-content {
            position: relative; z-index: 50; background: #fff; color: #333;
            min-height: 100vh; opacity: 0; /* 初始透明但占位 */
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        section { padding: 40px 0; border-bottom: 1px solid #eee; }
        h2 { color: var(--school-red); border-left: 8px solid var(--school-red); padding-left: 15px; }
        .card { background: #f9f9f9; padding: 25px; border-radius: 20px; border: 1px solid #eee; margin-top: 15px; }
        
        nav { position: sticky; top: 0; background: rgba(255,255,255,0.9); padding: 15px; display: flex; gap: 20px; z-index: 100; border-bottom: 1px solid #ddd; }
        nav a { color: #333; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro-wrapper">
        <div class="hero-section" id="hero">
            <div class="hero-bg"></div>
            <div id="gearContainer" style="text-align: center;">
                <div id="gearIcon">⚙️</div>
                <h1 class="hero-title">齿轮•转向未来</h1>
                <div class="hero-subtitle">Class of 2026</div>
            </div>
        </div>
        <div class="scroll-space"></div>
    </div>

    <main class="main-content" id="mainContent">
        <nav>
            <a href="#principals">致辞篇</a>
            <a href="#school">学校概况</a>
            <a href="#graduates">毕业生名单</a>
            <a href="#activities">校园活动</a>
            <a href="#committee">编委会</a>
        </nav>

        <div class="container">
            <section id="principals">
                <h2>致辞篇</h2>
                <div class="card"><h3>董事长致辞</h3><p>内容占位...</p></div>
                <div class="card"><h3>校长致辞</h3><p>内容占位...</p></div>
            </section>
            
            <section id="school">
                <h2>学校概况</h2>
                <div class="card"><p>校歌、校史、校训、创造奇迹、中华颂、八大信条。</p></div>
            </section>

            <section id="graduates">
                <h2>毕业生名单</h2>
                <div class="card"><p>高三毕业班级及导师赠言。</p></div>
            </section>

            <section id="activities">
                <h2>校园活动</h2>
                <div class="card"><p>一日营、成年礼、运动会记录。</p></div>
            </section>

            <section id="committee">
                <h2>编委会致谢</h2>
                <div class="card"><p>2026 毕联会全体成员致谢。</p></div>
            </section>
        </div>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 核心动画：同步旋转和放大
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-space",
                start: "top top",
                end: "bottom top",
                scrub: 1, 
                onLeave: () => finalizeTransition()
            }
        });

        // 1. 齿轮自转
        tl.to("#gearIcon", { 
            rotation: 1440, 
            ease: "none"
        }, 0);

        // 2. 封面整体放大并变亮（光穿透感）
        tl.to("#hero", { 
            scale: 50, 
            opacity: 0, 
            filter: "brightness(2.5)", 
            ease: "power2.inOut" 
        }, 0);

        function finalizeTransition() {
            const main = document.getElementById('mainContent');
            const intro = document.getElementById('intro-wrapper');

            document.body.classList.add('locked');
            
            // 瞬间切换到白色内容页
            main.style.opacity = '1';
            document.body.style.background = "#fff";

            // 彻底销毁封面
            if (intro) intro.remove();

            window.scrollTo(0, 0);
            
            setTimeout(() => {
                document.body.classList.remove('locked');
                ScrollTrigger.refresh();
            }, 600);
        }
    </script>
</body>
</html>
