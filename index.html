<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026毕业刊 | 齿轮•转向未来</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        :root { --bg-dark: #000; --neon: #00f2ff; --school-red: #800000; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg-dark); color: #fff; font-family: sans-serif; overflow-x: hidden; }

        /* 封面层 */
        #intro-wrapper { width: 100%; position: relative; }
        .hero-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background: #000; pointer-events: none;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url('bg.jpg') center/cover no-repeat;
            z-index: -1;
        }
        #gearIcon { font-size: 8rem; text-shadow: 0 0 20px var(--neon); }
        .hero-title { font-size: 3.5rem; margin: 15px 0; text-shadow: 0 0 15px var(--neon); font-weight: bold; text-align: center; }
        .hero-subtitle { font-size: 1.5rem; color: var(--neon); }

        .scroll-space { height: 200vh; }

        /* --- 主内容区 --- */
        .main-content {
            position: relative; z-index: 1; background: #fff; color: #333;
            min-height: 100vh; visibility: hidden; opacity: 0; /* 初始完全不可见 */
            transition: opacity 0.8s ease;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        section { padding: 40px 0; border-bottom: 1px solid #eee; }
        h2 { color: var(--school-red); border-left: 8px solid var(--school-red); padding-left: 15px; }
        .card { background: #f9f9f9; padding: 25px; border-radius: 20px; border: 1px solid #eee; }
        
        nav { position: sticky; top: 0; background: rgba(255,255,255,0.9); padding: 15px; display: flex; gap: 20px; overflow-x: auto; z-index: 10; border-bottom: 1px solid #ddd; }
        nav a { color: #333; text-decoration: none; font-weight: bold; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="intro-wrapper">
        <div class="hero-section" id="hero">
            <div class="hero-bg"></div>
            <div id="gearContainer" style="text-align: center;">
                <div id="gearIcon">⚙️</div>
                <h1 class="hero-title">齿轮•转向未来</h1>
                <div class="hero-subtitle">2026年毕联会</div>
            </div>
        </div>
        <div class="scroll-space"></div>
    </div>

    <main class="main-content" id="mainContent">
        <nav>
            <a href="#principals">长官致辞</a>
            <a href="#school">学校概况</a>
            <a href="#graduates">毕业生名单</a>
            <a href="#activities">校园活动</a>
        </nav>

        <div class="container">
            <section id="principals">
                <h2>致辞篇</h2>
                <div class="card"><h3>董事长致辞</h3><p>在此填入文字...</p></div>
            </section>
            <section id="school">
                <h2>学校概况</h2>
                <div class="card"><p>校歌、校旗、校史简介。</p></div>
            </section>
            <section id="graduates">
                <h2>毕业生名单</h2>
                <div class="card"><p>同学们的联络方式与照片。</p></div>
            </section>
            <section id="activities">
                <h2>校园活动</h2>
                <div class="card"><p>2021-2026 的点点滴滴。</p></div>
            </section>
        </div>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 封面转化动画
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-space",
                start: "top top",
                end: "bottom top",
                scrub: 0.6,
                onLeave: () => finalizeTransition() // 到底部离开时销毁封面
            }
        });

        tl.to("#hero", { 
            scale: 25, 
            opacity: 0, 
            duration: 2, 
            ease: "power2.in" 
        }, 0);

        function finalizeTransition() {
            // 1. 显示内容区
            const main = document.getElementById('mainContent');
            main.style.visibility = 'visible';
            main.style.opacity = '1';

            // 2. 彻底移除封面 HTML
            const intro = document.getElementById('intro-wrapper');
            if (intro) {
                intro.remove(); 
            }

            // 3. 强制页面复位到最顶部
            window.scrollTo(0, 0);

            // 4. 重要：重置背景色并刷新滚动引擎
            document.body.style.background = "#fff";
            ScrollTrigger.refresh(); // 告诉浏览器高度变了，重新计算所有位置
        }
    </script>
</body>
</html>
