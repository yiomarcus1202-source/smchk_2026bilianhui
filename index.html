<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026毕业刊 | 齿轮•转向未来</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root { --bg-dark: #000; --neon: #00f2ff; --school-red: #800000; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg-dark); color: #fff; font-family: "PingFang SC", sans-serif; }
        body.locked { overflow: hidden !important; }

        #intro-wrapper { width: 100%; position: relative; }
        .hero-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background: #000; pointer-events: none; overflow: hidden;
        }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('bg.jpg') center/cover no-repeat;
            z-index: -1;
        }

        /* --- 增强光影的齿轮 --- */
        #gearIcon { 
            font-size: clamp(6rem, 20vw, 10rem); 
            /* 叠加多层阴影营造光影感 */
            text-shadow: 
                0 0 10px var(--neon),
                0 0 30px var(--neon),
                0 0 60px rgba(0, 242, 255, 0.5);
            filter: drop-shadow(0 0 15px var(--neon));
            will-change: transform, filter;
        }

        .hero-title { font-size: clamp(2.5rem, 10vw, 4rem); margin: 20px 0; text-shadow: 0 0 15px var(--neon); font-weight: bold; text-align: center; }
        .hero-subtitle { font-size: 1.5rem; color: var(--neon); letter-spacing: 4px; }

        .scroll-space { height: 350vh; }

        /* --- 主内容区 --- */
        .main-content {
            position: relative; z-index: 1; background: #fff; color: #333;
            min-height: 100vh; visibility: hidden; opacity: 0;
            transition: opacity 1.2s ease;
        }
        nav { position: sticky; top: 0; background: rgba(255,255,255,0.95); padding: 15px; display: flex; gap: 20px; overflow-x: auto; z-index: 200; border-bottom: 1px solid #eee; backdrop-filter: blur(5px); }
        nav a { color: #333; text-decoration: none; font-weight: bold; white-space: nowrap; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        section { padding: 60px 0; border-bottom: 1px solid #eee; }
        h2 { font-size: 2.2rem; color: var(--school-red); border-left: 10px solid var(--school-red); padding-left: 15px; margin-bottom: 30px; }
        .card { background: #fdfdfd; padding: 25px; border-radius: 20px; border: 1px solid #eee; }
        .contact-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .contact-table th, .contact-table td { padding: 12px; border: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <div id="intro-wrapper">
        <div class="hero-section" id="hero">
            <div class="hero-bg"></div>
            <div id="gearContainer" style="text-align: center;">
                <div id="gearIcon">⚙️</div>
                <h1 class="hero-title">齿轮•转向未来</h1>
                <div class="hero-subtitle">2026年毕联会</div>
            </div>
        </div>
        <div class="scroll-space"></div>
    </div>

    <main class="main-content" id="mainContent">
        <nav>
            <a href="#principals">致辞篇</a>
            <a href="#school">学校概况</a>
            <a href="#graduates">毕业生名单</a>
            <a href="#activities">校园活动</a>
            <a href="#committee">编委会/致谢</a>
        </nav>

        <div class="container">
            <section id="principals">
                <h2>致辞篇</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div class="card"><h3>董事长致辞</h3><p>在此填入文字...</p></div>
                    <div class="card"><h3>校长致辞</h3><p>在此填入文字...</p></div>
                </div>
            </section>
            
            <section id="school">
                <h2>学校概况</h2>
                <div class="card"><p>校歌、校史、校训、创造奇迹、中华颂、八大信条。</p></div>
            </section>

            <section id="graduates">
                <h2>毕业生名单</h2>
                <div class="card">
                    <p>班导师赠言及班委会名单。</p>
                    <table class="contact-table">
                        <thead><tr><th>姓名</th><th>学号</th><th>IG</th></tr></thead>
                        <tbody><tr><td>王小明</td><td>210001</td><td>@xiaoming</td></tr></tbody>
                    </table>
                </div>
            </section>

            <section id="activities">
                <h2>校园活动回顾</h2>
                <div class="card"><p>一日营、成年礼、运动会等照片集。</p></div>
            </section>

            <section id="committee">
                <h2>编委会致谢</h2>
                <div class="card"><p>感谢所有参与制作的同学。2026 毕业快乐！</p></div>
            </section>
        </div>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- 核心修改：同步动画逻辑 ---
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-space",
                start: "top top",
                end: "bottom top",
                scrub: 1, // 保持同步手感
                onLeave: () => finalizeTransition()
            }
        });

        // 旋转和放大在同一个起点（0）开始，同时进行
        tl.to("#gearIcon", { 
            rotation: 1440, // 增加旋转圈数
            ease: "none"
        }, 0)
        .to("#hero", { 
            scale: 50, 
            opacity: 0, 
            filter: "brightness(2)", // 放大时增加亮度，模拟“光穿透”
            ease: "power2.inOut" 
        }, 0); // 必须也是 0，确保同步

        function finalizeTransition() {
            const main = document.getElementById('mainContent');
            const intro = document.getElementById('intro-wrapper');

            document.body.classList.add('locked');
            main.style.visibility = 'visible';
            main.style.opacity = '1';
            document.body.style.background = "#fff";

            if (intro) intro.remove();
            window.scrollTo(0, 0);
            
            setTimeout(() => {
                document.body.classList.remove('locked');
                ScrollTrigger.refresh();
            }, 600);
        }
    </script>
</body>
</html>
