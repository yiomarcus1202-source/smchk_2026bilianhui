<!DOCTYPE html>
<html lang="zh-MY">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026毕业刊 | 齿轮•转向未来</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root { --bg-dark: #000; --neon: #00f2ff; --school-red: #800000; }
        
        /* 强制初始状态为黑，防止白闪 */
        html, body { margin: 0; padding: 0; background-color: #000; overflow-x: hidden; width: 100%; }
        
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body.locked { overflow: hidden !important; }

        /* --- 封面转场层：确保最高级 --- */
        #intro-wrapper { width: 100%; position: relative; z-index: 9999; }
        
        .hero-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000; /* 纯黑底色 */
            pointer-events: none;
            overflow: hidden;
        }

        /* 修复背景：确保背景图层级正确 */
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, #000 70%), 
                        url('bg.jpg') center/cover no-repeat;
            z-index: -1;
            opacity: 1;
        }

        /* 强化齿轮光影：增加外发光 */
        #gearIcon { 
            font-size: 8rem; 
            color: #fff;
            text-shadow: 
                0 0 15px var(--neon),
                0 0 40px var(--neon),
                0 0 70px rgba(0, 242, 255, 0.8);
            filter: drop-shadow(0 0 10px var(--neon));
            will-change: transform;
        }

        .hero-title { font-size: 3.5rem; margin: 20px 0; text-shadow: 0 0 15px var(--neon); font-weight: bold; color: #fff; }
        .hero-subtitle { font-size: 1.5rem; color: var(--neon); letter-spacing: 5px; }

        /* 滚动空间 */
        .scroll-space { height: 350vh; background: transparent; }

        /* --- 主内容区 --- */
        .main-content {
            position: relative; z-index: 10; background: #fff; color: #333;
            min-height: 100vh; display: none; /* 初始彻底隐藏，防止干扰渲染 */
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        section { padding: 40px 0; border-bottom: 1px solid #eee; }
        h2 { font-size: 2rem; color: var(--school-red); border-left: 8px solid var(--school-red); padding-left: 15px; }
        .card { background: #fdfdfd; padding: 25px; border-radius: 20px; border: 1px solid #eee; margin-top: 15px; }
        
        nav { position: sticky; top: 0; background: rgba(255,255,255,0.95); padding: 15px; display: flex; gap: 20px; z-index: 100; border-bottom: 1px solid #ddd; backdrop-filter: blur(5px); }
        nav a { color: #333; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro-wrapper">
        <div class="hero-section" id="hero">
            <div class="hero-bg"></div>
            <div id="gearContainer" style="text-align: center;">
                <div id="gearIcon">⚙️</div>
                <h1 class="hero-title">齿轮•转向未来</h1>
                <div class="hero-subtitle">CLASS OF 2026</div>
            </div>
        </div>
        <div class="scroll-space"></div>
    </div>

    <main class="main-content" id="mainContent">
        <nav>
            <a href="#principals">致辞篇</a>
            <a href="#school">学校概况</a>
            <a href="#graduates">毕业生名单</a>
            <a href="#activities">校园活动</a>
            <a href="#committee">编委会</a>
        </nav>

        <div class="container">
            <section id="principals">
                <h2>致辞篇</h2>
                <div class="card"><h3>董事长致辞</h3><p>内容占位：在此输入董事长寄语...</p></div>
                <div class="card"><h3>校长致辞</h3><p>内容占位：在此输入校长寄语...</p></div>
            </section>
            
            <section id="school">
                <h2>学校精神与概况</h2>
                <div class="card"><p>校歌、校史、校训、创造奇迹、中华颂、八大信条。</p></div>
            </section>

            <section id="graduates">
                <h2>高三毕业生名单 (2026)</h2>
                <div class="card"><p>高三毕业班级及导师赠言。表格填入处...</p></div>
            </section>

            <section id="activities">
                <h2>校园活动回顾</h2>
                <div class="card"><p>2021-2026 校园生活点滴。</p></div>
            </section>

            <section id="committee">
                <h2>编委会致谢</h2>
                <div class="card"><p>2026 毕联会全体成员致谢。毕业快乐！</p></div>
            </section>
        </div>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 初始化：确保一开始就能看到封面
        window.onload = () => {
            gsap.set("#hero", { opacity: 1 });
        };

        // 动画逻辑：旋转 + 放大 同步进行
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-space",
                start: "top top",
                end: "bottom top",
                scrub: 1, 
                onLeave: () => finalizeTransition()
            }
        });

        // 齿轮自转
        tl.to("#gearIcon", { 
            rotation: 1440, 
            ease: "none"
        }, 0);

        // 整个容器同步放大并消失
        tl.to("#hero", { 
            scale: 60, 
            opacity: 0, 
            duration: 3,
            ease: "power2.inOut" 
        }, 0);

        function finalizeTransition() {
            const main = document.getElementById('mainContent');
            const intro = document.getElementById('intro-wrapper');

            // 1. 瞬间解锁白色页面
            main.style.display = 'block';
            document.body.style.backgroundColor = "#fff";

            // 2. 物理删除封面，防止遮挡
            if (intro) {
                intro.parentNode.removeChild(intro);
            }

            // 3. 页面瞬间回到顶部
            window.scrollTo(0, 0);

            // 4. 强制重置滚动锁，刷新引擎
            document.body.style.overflow = "auto";
            ScrollTrigger.refresh();
            
            console.log("转向未来：转场成功完成");
        }
    </script>
</body>
</html>
